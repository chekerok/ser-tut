let tgUser = null;
let userLat = null;
let userLng = null;
let map = null;
let markers = {}; // message_id -> leaflet marker

// ------ ИНИЦИАЛИЗАЦИЯ ------

window.addEventListener('DOMContentLoaded', async () => {
  const tg = window.Telegram?.WebApp;

  if (!tg || !tg.initDataUnsafe?.user) {
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('header').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    document.getElementById('map').style.display = 'none';
    document.getElementById('bottom-bar').style.display = 'none';
    return;
  }

  tg.expand();
  tgUser = tg.initDataUnsafe.user;
  document.getElementById('user-badge').textContent = '@' + (tgUser.username || tgUser.first_name);

  initMap();
  locateMe();
  await loadMarkers();
});

// ------ КАРТА ------

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([55.75, 37.61], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(map);
}

function locateMe() {
  setStatus('определяем геолокацию...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      map.setView([userLat, userLng], 16);
      document.getElementById('btn-ser').disabled = false;
      setStatus('готово 💩');
    },
    err => {
      setStatus('ошибка геолокации: ' + err.message);
    },
    { enableHighAccuracy: true }
  );
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ------ ИКОНКА ------

function poopIcon() {
  return L.divIcon({
    html: '<div style="font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">💩</div>',
    className: '',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -34],
  });
}

// ------ ДОБАВИТЬ МЕТКУ ------

async function serTut() {
  if (!userLat || !userLng) {
    setStatus('сначала дождись геолокации!');
    return;
  }

  const btn = document.getElementById('btn-ser');
  btn.disabled = true;
  setStatus('ставим метку...');

  try {
    // 1. Пишем в Telegram канал
    const text = `💩 @${tgUser.username || tgUser.first_name}\n${userLat},${userLng}\n${Date.now()}`;
    const tgRes = await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CONFIG.CHANNEL_ID, text }),
    });
    const tgData = await tgRes.json();

    if (!tgData.ok) throw new Error('Telegram error: ' + tgData.description);

    const messageId = tgData.result.message_id;
    const username = tgUser.username || tgUser.first_name;
    const userId = String(tgUser.id);
    const ts = Date.now();

    // 2. Пишем в Google Sheets
    await sheetsAppend([messageId, userId, username, userLat, userLng, ts]);

    // 3. Добавляем маркер на карту
    addMarker({ message_id: messageId, username, user_id: userId, lat: userLat, lng: userLng, timestamp: ts });

    setStatus('метка поставлена! 💩');
  } catch (e) {
    console.error(e);
    setStatus('ошибка: ' + e.message);
  }

  btn.disabled = false;
}

// ------ ЗАГРУЗИТЬ ВСЕ МЕТКИ ------

async function loadMarkers() {
  setStatus('загружаем метки...');
  try {
    const token = await getSheetsToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEETS_ID}/values/Sheet1!A2:F1000`;
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    const data = await res.json();

    if (data.values) {
      for (const row of data.values) {
        const [message_id, user_id, username, lat, lng, timestamp] = row;
        if (lat && lng) {
          addMarker({ message_id, user_id, username, lat: parseFloat(lat), lng: parseFloat(lng), timestamp });
        }
      }
    }
    setStatus('готово 💩');
  } catch (e) {
    console.error(e);
    setStatus('ошибка загрузки меток');
  }
}

// ------ ДОБАВИТЬ МАРКЕР ------

function addMarker({ message_id, user_id, username, lat, lng, timestamp }) {
  const marker = L.marker([lat, lng], { icon: poopIcon() }).addTo(map);
  const date = new Date(parseInt(timestamp)).toLocaleString('ru-RU');
  const isOwn = String(user_id) === String(tgUser?.id);

  const popupHtml = `
    <div class="popup-inner">
      <div class="popup-title">💩 Сёр тут</div>
      <div class="popup-user">@${username}</div>
      <div class="popup-time">${date}</div>
      ${isOwn ? `<button class="popup-delete" onclick="deleteMarker('${message_id}', this)">🗑 Удалить</button>` : ''}
    </div>`;

  marker.bindPopup(popupHtml);
  markers[message_id] = marker;
}

// ------ УДАЛИТЬ МЕТКУ ------

async function deleteMarker(messageId, btn) {
  btn.disabled = true;
  btn.textContent = 'удаляем...';

  try {
    // 1. Удаляем из Telegram
    await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/deleteMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CONFIG.CHANNEL_ID, message_id: parseInt(messageId) }),
    });

    // 2. Удаляем из Sheets
    await sheetsDeleteRow(messageId);

    // 3. Убираем с карты
    if (markers[messageId]) {
      map.removeLayer(markers[messageId]);
      delete markers[messageId];
    }

    setStatus('метка удалена');
  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btn.textContent = '🗑 Удалить';
    setStatus('ошибка удаления');
  }
}

// ============================================================
// GOOGLE SHEETS API (JWT auth)
// ============================================================

let sheetsTokenCache = null;
let sheetsTokenExpiry = 0;

async function getSheetsToken() {
  if (sheetsTokenCache && Date.now() < sheetsTokenExpiry) return sheetsTokenCache;

  const now = Math.floor(Date.now() / 1000);
  const header = btoa(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const claim = btoa(JSON.stringify({
    iss: CONFIG.SERVICE_ACCOUNT_EMAIL,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    exp: now + 3600,
    iat: now,
  })).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');

  const unsigned = header + '.' + claim;
  const signature = await signRS256(unsigned, CONFIG.PRIVATE_KEY);
  const jwt = unsigned + '.' + signature;

  const res = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`,
  });
  const data = await res.json();

  sheetsTokenCache = data.access_token;
  sheetsTokenExpiry = Date.now() + 3500 * 1000;
  return sheetsTokenCache;
}

async function signRS256(data, pemKey) {
  const pemContents = pemKey.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g, '');
  const binaryDer = Uint8Array.from(atob(pemContents), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey(
    'pkcs8', binaryDer.buffer,
    { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
    false, ['sign']
  );
  const encoder = new TextEncoder();
  const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, encoder.encode(data));
  return btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}

async function sheetsAppend(row) {
  const token = await getSheetsToken();
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEETS_ID}/values/Sheet1!A1:F1:append?valueInputOption=RAW`, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: [row] }),
  });
}

async function sheetsDeleteRow(messageId) {
  const token = await getSheetsToken();

  // Читаем все строки чтобы найти нужную
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEETS_ID}/values/Sheet1!A2:A1000`, {
    headers: { Authorization: 'Bearer ' + token },
  });
  const data = await res.json();

  if (!data.values) return;
  const rowIndex = data.values.findIndex(r => String(r[0]) === String(messageId));
  if (rowIndex === -1) return;

  // Получаем sheetId
  const metaRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEETS_ID}`, {
    headers: { Authorization: 'Bearer ' + token },
  });
  const meta = await metaRes.json();
  const sheetId = meta.sheets[0].properties.sheetId;

  // Удаляем строку (rowIndex + 1 потому что строки с 2й, +1 для 0-индекса)
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEETS_ID}:batchUpdate`, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      requests: [{
        deleteDimension: {
          range: { sheetId, dimension: 'ROWS', startIndex: rowIndex + 1, endIndex: rowIndex + 2 }
        }
      }]
    }),
  });
}
