<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сёр Тут</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://api-maps.yandex.ru/2.1/?apikey=e2cf8129-ff43-4729-b542-1591d12b5fef&lang=ru_RU"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Russo+One&family=Inter:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #1c1c1c;
    color: #fff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---- ЗАГЛУШКА ---- */
  #gate {
    position: fixed; inset: 0; background: #1c1c1c;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; gap: 16px; padding: 32px; text-align: center;
  }
  #gate .emoji { font-size: 64px; }
  #gate h1 { font-family: 'Russo One', sans-serif; font-size: 28px; color: #fff; }
  #gate p { color: #aaa; font-size: 15px; line-height: 1.5; }
  #gate a {
    margin-top: 8px; background: #3a3a3a; color: #fff;
    padding: 12px 28px; border-radius: 50px;
    text-decoration: none; font-weight: 600; font-size: 16px;
  }

  /* ---- ХЕДЕР ---- */
  #header {
    background: #1c1c1c;
    padding: 6px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
  }
  #header-left {
    display: flex; align-items: center; gap: 8px;
  }
  #header h1 {
    font-family: 'Pacifico', cursive;
    font-size: 18px;
    color: #fff;
    letter-spacing: 0px;
  }
  #user-badge {
    font-size: 13px;
    color: #aaa;
    font-family: 'Inter', sans-serif;
  }

  /* ---- СТАТУС ---- */
  #status {
    text-align: center;
    font-size: 12px;
    color: #f5c542;
    padding: 4px 0;
    flex-shrink: 0;
    background: #1c1c1c;
    font-family: 'Inter', sans-serif;
  }

  /* ---- КАРТА ---- */
  #map { flex: 1; width: 100%; }

  /* ---- НИЖНЯЯ ПАНЕЛЬ ---- */
  #bottom-bar {
    background: #1c1c1c;
    padding: 14px 16px 20px;
    display: flex; gap: 12px;
    flex-shrink: 0; z-index: 100;
    align-items: center;
  }
  #btn-locate {
    width: 60px; height: 60px;
    background: #2e2e2e;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #btn-locate:active { background: #444; }

  #btn-ser {
    flex: 1;
    height: 60px;
    background: #2e2e2e;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Russo One', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.15s;
  }
  #btn-ser:active { background: #444; }
  #btn-ser:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

  /* ---- МАРКЕР ---- */
  .marker-wrap {
    position: relative;
    display: inline-block;
    transform: translate(-50%, -100%);
  }
  .marker-label {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    background: rgba(28,28,28,0.92);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 10px;
    color: #fff;
    line-height: 1.5;
    text-align: center;
    pointer-events: none;
    margin-bottom: 3px;
  }
  .marker-icon { font-size: 30px; line-height: 1; display: block; }

  /* ---- КУРСОР ПОЛЬЗОВАТЕЛЯ ---- */
  #user-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 9000;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: none;
  }

  @keyframes crosshairPulse {
    0%   { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
    50%  { transform: translate(-50%, -50%) scale(0.82); opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
  }
  #user-cursor.active {
    display: block;
    animation: crosshairPulse 1.6s ease-in-out infinite;
  }

  /* ---- АНИМАЦИИ ---- */
  @keyframes poopGrow {
    0%   { transform: scaleX(1)    scaleY(0);   opacity: 0; }
    55%  { transform: scaleX(1)    scaleY(1);   opacity: 1; }
    68%  { transform: scaleX(1.35) scaleY(0.62); }
    80%  { transform: scaleX(0.85) scaleY(1.2); }
    90%  { transform: scaleX(1.1)  scaleY(0.9); }
    100% { transform: scaleX(1)    scaleY(1);   opacity: 1; }
  }
  .poop-drop {
    animation: poopGrow 0.75s cubic-bezier(0.22,1,0.36,1) forwards;
    transform-origin: bottom center;
    display: inline-block;
  }
  @keyframes btnPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(0.93); }
    70%  { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .btn-pulse { animation: btnPulse 0.4s ease forwards; }

  /* ---- ПОПАП ---- */
  .popup-balloon { font-family: 'Inter', sans-serif; min-width: 150px; }
  .popup-title { font-weight: 700; font-size: 14px; color: #c8860a; margin-bottom: 4px; }
  .popup-user { font-size: 13px; color: #333; }
  .popup-time { font-size: 11px; color: #999; margin-top: 2px; }
  .popup-like {
    margin-top: 6px;
    background: #f0f0f0;
    border: none; border-radius: 8px; padding: 5px 12px;
    font-size: 13px; cursor: pointer; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: background 0.15s;
  }
  .popup-like:active { background: #ddd; }
  .popup-like.liked { background: #ffe0e0; }
  .popup-delete {
    margin-top: 5px; background: #c0392b; color: #fff;
    border: none; border-radius: 8px; padding: 5px 12px;
    font-size: 13px; cursor: pointer; width: 100%;
  }
</style>
</head>
<body>

<div id="gate" style="display:none">
  <div class="emoji">💩</div>
  <h1>Сёр Тут</h1>
  <p>Это приложение работает только через Telegram.<br>Открой его через бота.</p>
  <a href="https://t.me/ser_tut034_bot">Открыть в Telegram</a>
</div>

<div id="header">
  <div id="header-left">
    <span style="font-size:22px">💩</span>
    <h1>сёртут</h1>
  </div>
  <div id="user-badge">загрузка...</div>
</div>
<div id="status">инициализация...</div>
<div id="map"></div>
<div id="user-cursor">
  <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- верхняя линия -->
    <line x1="30" y1="4"  x2="30" y2="22" stroke="#e53e3e" stroke-width="4" stroke-linecap="round"/>
    <!-- нижняя линия -->
    <line x1="30" y1="38" x2="30" y2="56" stroke="#e53e3e" stroke-width="4" stroke-linecap="round"/>
    <!-- левая линия -->
    <line x1="4"  y1="30" x2="22" y2="30" stroke="#e53e3e" stroke-width="4" stroke-linecap="round"/>
    <!-- правая линия -->
    <line x1="38" y1="30" x2="56" y2="30" stroke="#e53e3e" stroke-width="4" stroke-linecap="round"/>
    <!-- центральная точка -->
    <circle cx="30" cy="30" r="3" fill="#e53e3e"/>
  </svg>
</div>
<div id="bottom-bar">
  <button id="btn-locate" onclick="locateMe()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="2" x2="12" y2="6"/>
      <line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="6" y2="12"/>
      <line x1="18" y1="12" x2="22" y2="12"/>
    </svg>
  </button>
  <button id="btn-ser" onclick="serTut()" disabled>СЁР ТУТ 💩</button>
</div>

<script>
// ============================================================
const BOT_TOKEN = 'ВСТАВЬ_ТОКЕН_СЮДА';
const CHANNEL_ID = '-1003921076438';
// ============================================================

const API = 'https://api.telegram.org/bot' + BOT_TOKEN;

var tgUser = null;
var userLat = null;
var userLng = null;
var map = null;
var markers = {};
var dbMessageId = null;
var db = [];
var isAiming = false; // режим прицеливания

// ------ СТАРТ ------

window.addEventListener('DOMContentLoaded', function() {
  var tg = window.Telegram && window.Telegram.WebApp;

  if (!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user) {
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('header').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    document.getElementById('map').style.display = 'none';
    document.getElementById('bottom-bar').style.display = 'none';
    return;
  }

  tg.expand();
  tgUser = tg.initDataUnsafe.user;
  document.getElementById('user-badge').textContent = '@' + (tgUser.username || tgUser.first_name);

  setStatus('загружаем карту...');

  ymaps.ready(function() {
    setStatus('карта готова');
    map = new ymaps.Map('map', {
      center: [55.75, 37.61],
      zoom: 12,
      controls: ['zoomControl']
    });
    locateMe();
    loadDB();
  });
});

// ------ КАРТА ------

function locateMe() {
  setStatus('определяем геолокацию...');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      map.setCenter([userLat, userLng], 16, { duration: 300 });
      document.getElementById('btn-ser').disabled = false;
      setStatus('готово 💩');
    },
    function(err) { setStatus('ошибка геолокации: ' + err.message); },
    { enableHighAccuracy: true }
  );
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ------ МАРКЕРЫ ------

function addMarker(entry, animate) {
  var id = entry.id;
  var username = entry.username;
  var ip = entry.ip || '';
  var lat = entry.lat;
  var lng = entry.lng;
  var timestamp = entry.timestamp;
  var user_id = entry.user_id;

  var date = new Date(parseInt(timestamp)).toLocaleString('ru-RU');
  var isOwn = String(user_id) === String(tgUser && tgUser.id);
  var animClass = animate ? 'poop-drop' : '';

  var labelHtml = ip
    ? '@' + username + '<br><span style="font-size:9px;color:#aac">' + ip + '</span>'
    : '@' + username;

  var IconLayout = ymaps.templateLayoutFactory.createClass(
    '<div class="marker-wrap">' +
      '<div class="marker-label">' + labelHtml + '</div>' +
      '<span class="marker-icon ' + animClass + '">💩</span>' +
    '</div>'
  );

  var deleteHtml = isOwn
    ? '<button class="popup-delete" onclick="deleteMarker(\'' + id + '\', this)">🗑 Удалить</button>'
    : '';
  var ipHtml = ip ? '<div class="popup-user" style="font-size:11px;color:#aaa">' + ip + '</div>' : '';

  var placemark = new ymaps.Placemark([lat, lng], {
    balloonContent:
      '<div class="popup-balloon">' +
        '<div class="popup-title">💩 Сёр тут</div>' +
        '<div class="popup-user">@' + username + '</div>' +
        ipHtml +
        '<div class="popup-time">' + date + '</div>' +
        deleteHtml +
      '</div>'
  }, {
    iconLayout: IconLayout,
    iconShape: { type: 'Rectangle', coordinates: [[-16, -52], [16, 0]] }
  });

  map.geoObjects.add(placemark);
  markers[id] = placemark;
}

function renderMarkers() {
  for (var key in markers) map.geoObjects.remove(markers[key]);
  markers = {};
  for (var i = 0; i < db.length; i++) addMarker(db[i], false);
}

// ------ БД ------

function loadDB() {
  setStatus('загружаем метки...');
  fetch(API + '/getChat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHANNEL_ID })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.ok) throw new Error(data.description);
    var pinned = data.result.pinned_message;
    if (!pinned) {
      setStatus('первый запуск, создаём базу...');
      return initDB();
    } else {
      dbMessageId = pinned.message_id;
      try {
        db = JSON.parse(pinned.text);
        setStatus('загружено меток: ' + db.length + ' 💩');
      } catch(e) {
        setStatus('ошибка парсинга базы: ' + e.message);
        db = [];
      }
      renderMarkers();
    }
  })
  .catch(function(e) { setStatus('ошибка БД: ' + e.message); });
}

function initDB() {
  return fetch(API + '/sendMessage', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHANNEL_ID, text: '[]' })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.ok) throw new Error(data.description);
    dbMessageId = data.result.message_id;
    return fetch(API + '/pinChatMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHANNEL_ID, message_id: dbMessageId, disable_notification: true })
    });
  })
  .then(function() {
    db = [];
    setStatus('готово 💩');
  });
}

function saveDB() {
  return fetch(API + '/editMessageText', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHANNEL_ID, message_id: dbMessageId, text: JSON.stringify(db) })
  });
}

// ------ ПОСТАВИТЬ МЕТКУ (два этапа) ------

function serTut() {
  if (!userLat || !userLng) { setStatus('сначала дождись геолокации!'); return; }
  var btn = document.getElementById('btn-ser');
  var cursor = document.getElementById('user-cursor');

  if (!isAiming) {
    // ЭТАП 1 — включаем прицел
    isAiming = true;
    cursor.classList.add('active');
    btn.textContent = 'ПОДТВЕРДИТЬ 💩';
    btn.style.background = '#c0392b';
    setStatus('наведи стрелку и нажми ещё раз');
    return;
  }

  // ЭТАП 2 — фиксируем центр карты как точку метки
  isAiming = false;
  cursor.classList.remove('active');
  btn.textContent = 'СЁР ТУТ 💩';
  btn.style.background = '';
  btn.disabled = true;
  setStatus('ставим метку...');

  var center = map.getCenter();
  var markLat = center[0];
  var markLng = center[1];

  // Пробуем получить IP с таймаутом 3 сек, если не вышло — идём без него
  var ipPromise = Promise.race([
    fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }),
    new Promise(function(resolve) { setTimeout(function() { resolve({ ip: '' }); }, 3000); })
  ]).catch(function() { return { ip: '' }; });

  ipPromise.then(function(ipData) {
    var entry = {
      id: Date.now().toString(),
      user_id: String(tgUser.id),
      username: tgUser.username || tgUser.first_name,
      lat: markLat,
      lng: markLng,
      timestamp: Date.now(),
      ip: ipData.ip || '',
      likes: []
    };

    return fetch(API + '/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: CHANNEL_ID,
        text: '\u{1F4A9} @' + entry.username + ' \u043D\u0430\u0441\u0451\u0440 \u0442\u0443\u0442\n\u{1F4CD} ' + entry.lat.toFixed(5) + ', ' + entry.lng.toFixed(5)
      })
    })
    .then(function() {
      db.push(entry);
      return saveDB().then(function() {
        playPoopSound();
        animateBtn();
        addMarker(entry, true);
        setStatus('метка поставлена! 💩');
        btn.disabled = false;
      });
    });
  })
  .catch(function(e) {
    setStatus('ошибка: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'СЁР ТУТ 💩';
    btn.style.background = '';
    isAiming = false;
    cursor.classList.remove('active');
  });
}

// ------ ЛАЙК ------

function toggleLike(id, btn) {
  var myId = String(tgUser && tgUser.id);
  var entry = null;
  for (var i = 0; i < db.length; i++) {
    if (db[i].id === id) { entry = db[i]; break; }
  }
  if (!entry) return;

  if (!entry.likes) entry.likes = [];
  var idx = entry.likes.indexOf(myId);
  if (idx === -1) {
    entry.likes.push(myId);
  } else {
    entry.likes.splice(idx, 1);
  }

  btn.disabled = true;
  saveDB().then(function() {
    // Перерисовываем маркер
    if (markers[id]) {
      map.geoObjects.remove(markers[id]);
      delete markers[id];
    }
    addMarker(entry, false);
    // Открываем балун снова
    if (markers[id]) markers[id].balloon.open();
  }).catch(function(e) {
    setStatus('ошибка: ' + e.message);
    btn.disabled = false;
  });
}

// ------ УДАЛИТЬ МЕТКУ ------

function deleteMarker(id, btn) {
  btn.disabled = true;
  btn.textContent = 'удаляем...';
  db = db.filter(function(e) { return e.id !== id; });
  saveDB().then(function() {
    if (markers[id]) {
      map.geoObjects.remove(markers[id]);
      delete markers[id];
    }
    setStatus('метка удалена');
  }).catch(function(e) {
    btn.disabled = false;
    btn.textContent = '🗑 Удалить';
    setStatus('ошибка: ' + e.message);
  });
}

// ------ ЗВУК ------

function playPoopSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc1 = ctx.createOscillator();
    var gain1 = ctx.createGain();
    osc1.connect(gain1); gain1.connect(ctx.destination);
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(180, ctx.currentTime);
    osc1.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.18);
    gain1.gain.setValueAtTime(0.55, ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    osc1.start(); osc1.stop(ctx.currentTime + 0.22);

    var bufSize = ctx.sampleRate * 0.08;
    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/bufSize, 3);
    var noise = ctx.createBufferSource();
    noise.buffer = buf;
    var gainN = ctx.createGain();
    gainN.gain.setValueAtTime(0.35, ctx.currentTime + 0.05);
    gainN.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.13);
    noise.connect(gainN); gainN.connect(ctx.destination);
    noise.start(ctx.currentTime + 0.05);

    var osc2 = ctx.createOscillator();
    var gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(520, ctx.currentTime + 0.15);
    osc2.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.32);
    gain2.gain.setValueAtTime(0.18, ctx.currentTime + 0.15);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc2.start(ctx.currentTime + 0.15); osc2.stop(ctx.currentTime + 0.35);
  } catch(e) {}
}

function animateBtn() {
  var btn = document.getElementById('btn-ser');
  btn.classList.remove('btn-pulse');
  void btn.offsetWidth;
  btn.classList.add('btn-pulse');
  setTimeout(function() { btn.classList.remove('btn-pulse'); }, 400);
}
</script>
</body>
</html>
