<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сёр Тут</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #1a1a2e;
    color: #fff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #gate {
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }
  #gate .emoji { font-size: 64px; }
  #gate h1 { font-family: 'Russo One', sans-serif; font-size: 28px; color: #f5c542; }
  #gate p { color: #aaa; font-size: 15px; line-height: 1.5; }
  #gate a {
    margin-top: 8px;
    background: #0088cc;
    color: #fff;
    padding: 12px 28px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
  }

  #header {
    background: #16213e;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #f5c542;
    z-index: 100;
    flex-shrink: 0;
  }
  #header h1 { font-family: 'Russo One', sans-serif; font-size: 20px; color: #f5c542; letter-spacing: 1px; }
  #user-badge { background: #0f3460; border-radius: 20px; padding: 6px 12px; font-size: 13px; color: #ccc; }

  #map { flex: 1; width: 100%; }

  #bottom-bar {
    background: #16213e;
    padding: 12px 16px;
    border-top: 2px solid #f5c542;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    z-index: 100;
  }

  #btn-ser {
    flex: 1;
    background: #f5c542;
    color: #1a1a2e;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Russo One', sans-serif;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #btn-ser:active { transform: scale(0.97); }
  #btn-ser:disabled { background: #555; color: #999; cursor: not-allowed; }

  #btn-locate {
    background: #0f3460;
    border: 2px solid #f5c542;
    color: #f5c542;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 20px;
    cursor: pointer;
  }

  #status {
    text-align: center;
    font-size: 12px;
    color: #888;
    padding: 4px 0 2px;
    flex-shrink: 0;
    background: #16213e;
  }

  .leaflet-popup-content-wrapper {
    background: #16213e;
    border: 2px solid #f5c542;
    border-radius: 12px;
    color: #fff;
  }
  .leaflet-popup-tip { background: #f5c542; }
  .leaflet-popup-content { margin: 10px 14px; }
  .popup-inner { display: flex; flex-direction: column; gap: 6px; }
  .popup-title { font-family: 'Russo One', sans-serif; font-size: 15px; color: #f5c542; }
  .popup-user { font-size: 13px; color: #ccc; }
  .popup-time { font-size: 11px; color: #666; }
  .popup-delete {
    margin-top: 4px;
    background: #c0392b;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="gate" style="display:none">
  <div class="emoji">💩</div>
  <h1>Сёр Тут</h1>
  <p>Это приложение работает только через Telegram.<br>Открой его через бота.</p>
  <a href="https://t.me/ser_tut034_bot">Открыть в Telegram</a>
</div>

<div id="header">
  <h1>💩 Сёр Тут</h1>
  <div id="user-badge">загрузка...</div>
</div>

<div id="status">инициализация...</div>
<div id="map"></div>

<div id="bottom-bar">
  <button id="btn-locate" onclick="locateMe()">📍</button>
  <button id="btn-ser" onclick="serTut()" disabled>💩 Сёр тут</button>
</div>

<script>
// ============================================================
// КОНФИГ — только токен бота, никаких внешних API ключей!
// ============================================================
const BOT_TOKEN = '8546740522:AAGknL1xglNM-RrMWeEoUKoIrATbuI4Z9vM';
const CHANNEL_ID = '-1003921076438';
// ============================================================

const API = `https://api.telegram.org/bot${BOT_TOKEN}`;

let tgUser = null;
let userLat = null;
let userLng = null;
let map = null;
let markers = {};
let dbMessageId = null; // id закреплённого сообщения — это наша БД
let db = [];            // массив меток

// ------ ИНИЦИАЛИЗАЦИЯ ------

window.addEventListener('DOMContentLoaded', async () => {
  const tg = window.Telegram?.WebApp;

  if (!tg || !tg.initDataUnsafe?.user) {
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('header').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    document.getElementById('map').style.display = 'none';
    document.getElementById('bottom-bar').style.display = 'none';
    return;
  }

  tg.expand();
  tgUser = tg.initDataUnsafe.user;
  document.getElementById('user-badge').textContent = '@' + (tgUser.username || tgUser.first_name);

  initMap();
  locateMe();
  await loadDB();
});

// ------ КАРТА ------

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([55.75, 37.61], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(map);
}

function locateMe() {
  setStatus('определяем геолокацию...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      map.setView([userLat, userLng], 16);
      document.getElementById('btn-ser').disabled = false;
      setStatus('готово 💩');
    },
    err => setStatus('ошибка геолокации: ' + err.message),
    { enableHighAccuracy: true }
  );
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function poopIcon() {
  return L.divIcon({
    html: '<div style="font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">💩</div>',
    className: '',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -34],
  });
}

// ------ БД: закреплённое сообщение в канале ------

async function loadDB() {
  setStatus('загружаем метки...');
  try {
    const res = await fetch(`${API}/getChat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHANNEL_ID }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.description);

    const pinned = data.result.pinned_message;

    if (!pinned) {
      await initDB();
    } else {
      dbMessageId = pinned.message_id;
      try { db = JSON.parse(pinned.text); } catch { db = []; }
      renderMarkers();
    }

    setStatus('готово 💩');
  } catch (e) {
    console.error(e);
    setStatus('ошибка: ' + e.message);
  }
}

async function initDB() {
  // Первый запуск — создаём закреплённое сообщение с пустым массивом
  const res = await fetch(`${API}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHANNEL_ID, text: '[]' }),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.description);

  dbMessageId = data.result.message_id;

  await fetch(`${API}/pinChatMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: CHANNEL_ID,
      message_id: dbMessageId,
      disable_notification: true,
    }),
  });

  db = [];
}

async function saveDB() {
  await fetch(`${API}/editMessageText`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: CHANNEL_ID,
      message_id: dbMessageId,
      text: JSON.stringify(db),
    }),
  });
}

// ------ МАРКЕРЫ ------

function renderMarkers() {
  for (const m of Object.values(markers)) map.removeLayer(m);
  markers = {};
  for (const entry of db) addMarker(entry);
}

function addMarker(entry) {
  const { id, user_id, username, lat, lng, timestamp } = entry;
  const marker = L.marker([lat, lng], { icon: poopIcon() }).addTo(map);
  const date = new Date(timestamp).toLocaleString('ru-RU');
  const isOwn = String(user_id) === String(tgUser?.id);

  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-title">💩 Сёр тут</div>
      <div class="popup-user">@${username}</div>
      <div class="popup-time">${date}</div>
      ${isOwn ? `<button class="popup-delete" onclick="deleteMarker('${id}', this)">🗑 Удалить</button>` : ''}
    </div>`);

  markers[id] = marker;
}

// ------ ПОСТАВИТЬ МЕТКУ ------

async function serTut() {
  if (!userLat || !userLng) { setStatus('сначала дождись геолокации!'); return; }

  const btn = document.getElementById('btn-ser');
  btn.disabled = true;
  setStatus('ставим метку...');

  try {
    const entry = {
      id: Date.now().toString(),
      user_id: String(tgUser.id),
      username: tgUser.username || tgUser.first_name,
      lat: userLat,
      lng: userLng,
      timestamp: Date.now(),
    };

    // Лог-сообщение в канал (для красоты)
    await fetch(`${API}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: CHANNEL_ID,
        text: `💩 @${entry.username} насёр тут\n📍 ${entry.lat.toFixed(5)}, ${entry.lng.toFixed(5)}`,
      }),
    });

    db.push(entry);
    await saveDB();
    addMarker(entry);
    setStatus('метка поставлена! 💩');
  } catch (e) {
    console.error(e);
    setStatus('ошибка: ' + e.message);
  }

  btn.disabled = false;
}

// ------ УДАЛИТЬ МЕТКУ ------

async function deleteMarker(id, btn) {
  btn.disabled = true;
  btn.textContent = 'удаляем...';

  try {
    db = db.filter(e => e.id !== id);
    await saveDB();

    if (markers[id]) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }

    setStatus('метка удалена');
  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btn.textContent = '🗑 Удалить';
    setStatus('ошибка удаления');
  }
}
</script>
</body>
</html>
